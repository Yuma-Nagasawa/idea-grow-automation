name: Generate Knowledge Assets

on:
  push:
    paths:
      - "ideas/*.md"
      - "ideas/**/*.md"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate cards from ideas
        run: |
          mkdir -p cards

          for file in ideas/*.md; do
            name=$(basename "$file" .md)
            card="cards/${name}.md"

            if [ ! -f "$card" ]; then
              cp templates/knowledge-card.md "$card"
              echo "" >> "$card"
              echo "## Source" >> "$card"
              echo "$file" >> "$card"
              echo "" >> "$card"
              echo "## Raw Idea" >> "$card"
              cat "$file" >> "$card"
            fi
          done

      - name: Generate prompts from ideas
        run: |
          mkdir -p prompts

          for file in ideas/*.md; do
            name=$(basename "$file" .md)
            prompt="prompts/${name}-prompt.md"

            if [ ! -f "$prompt" ]; then
              cp templates/prompt-template.md "$prompt"
              echo "" >> "$prompt"
              echo "## Source" >> "$prompt"
              echo "$file" >> "$prompt"
            fi
          done

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add cards/ prompts/
          git diff --cached --quiet || git commit -m "Generate knowledge assets"
          git push

      - name: Create review issue
        run: |
          gh issue create \
            --title "Review generated knowledge assets" \
            --body "ideas/ から生成された cards/ と prompts/ を確認してください。"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
